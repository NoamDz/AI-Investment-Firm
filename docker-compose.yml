services:
  qdrant:
    image: qdrant/qdrant:v1.11.0
    ports: ["6333:6333"]
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 5s
      retries: 10
      start_period: 10s

  firm:
    build: .
    environment:
      FIRM_BROKER: FAKE
      FIRM_HMAC_SECRET: "00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff"
      FIRM_INITIAL_POSITIONS: '{"AAPL":"10"}'
      FIRM_REPLAY_AT: "2024-03-13T14:30:00+00:00"
      QDRANT_URL: "http://qdrant:6333"
      FIRM_LLM_MODE: "${FIRM_LLM_MODE:-live}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      HF_HOME: /root/.cache/huggingface
    volumes:
      - ./data:/data
      - ${USERPROFILE:-${HOME}}/.cache/huggingface:/root/.cache/huggingface
    depends_on:
      qdrant:
        condition: service_healthy

volumes:
  qdrant_data:
