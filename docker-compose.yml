services:
  qdrant:
    image: qdrant/qdrant:v1.11.0
    ports: ["6333:6333"]
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 5s
      retries: 10
      start_period: 10s

  firm:
    build: .
    environment:
      FIRM_BROKER: FAKE
      FIRM_HMAC_SECRET: "00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff"
      # Object form: seed 10 AMD shares with avg_cost=600 so the Positions sheet
      # shows a real mark-to-market P&L (current deterministic quote ≈ $737.50,
      # so unrealized ≈ +$1,375). Shares-only form (e.g. '{"AMD":"10"}') seeds
      # avg_cost=current_quote → unrealized P&L = 0, which hides the column.
      FIRM_INITIAL_POSITIONS: '{"AMD":{"shares":"10","avg_cost":"600"}}'
      FIRM_REPLAY_AT: "2024-03-13T14:30:00+00:00"
      QDRANT_URL: "http://qdrant:6333"
      FIRM_LLM_MODE: "${FIRM_LLM_MODE:-live}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      HF_HOME: /root/.cache/huggingface
      # Align with dashboard.py default + tracer default so spans land in the
      # bind-mounted /data dir and the dashboard's Trace tab can read them.
      FIRM_TRACES_ROOT: /data/traces
    volumes:
      - ./data:/data
      - ${USERPROFILE:-${HOME}}/.cache/huggingface:/root/.cache/huggingface
    depends_on:
      qdrant:
        condition: service_healthy

  litestream:
    image: litestream/litestream:0.3.13
    command: replicate -config /etc/litestream.yml
    volumes:
      - ./data:/data
      - ./config/litestream.yml:/etc/litestream.yml:ro
    depends_on:
      firm:
        condition: service_started
    healthcheck:
      # File destination is growing — verified by checking that the replica
      # generation dir exists. (Litestream creates /data/litestream/firm/
      # on first sync.)
      test: ["CMD-SHELL", "test -d /data/litestream/firm || exit 1"]
      interval: 10s
      retries: 6
      start_period: 30s

volumes:
  qdrant_data:
